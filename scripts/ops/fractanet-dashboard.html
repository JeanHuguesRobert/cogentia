<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fractanet Ops</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4f;
      --text: #e8edf4;
      --muted: #8b9cb3;
      --ok: #3dd68c;
      --warn: #f0b429;
      --bad: #f56565;
      --accent: #6eb5ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
      min-height: 100vh;
    }
    header {
      padding: 1.25rem 1.5rem 0.75rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1.5rem;
      align-items: baseline;
      justify-content: space-between;
    }
    h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .subtitle { color: var(--muted); font-size: 0.875rem; }
    main { padding: 1.25rem 1.5rem 2rem; max-width: 1200px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.9rem 1rem;
    }
    .card h2 {
      margin: 0 0 0.35rem;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 600;
    }
    .card .value { font-size: 1.05rem; font-weight: 600; }
    .pill {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .pill.ok { background: rgba(61, 214, 140, 0.18); color: var(--ok); }
    .pill.warn { background: rgba(240, 180, 41, 0.18); color: var(--warn); }
    .pill.bad { background: rgba(245, 101, 101, 0.18); color: var(--bad); }
    section { margin-bottom: 1.5rem; }
    section h3 {
      margin: 0 0 0.6rem;
      font-size: 0.95rem;
      color: var(--accent);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    th, td {
      text-align: left;
      padding: 0.55rem 0.7rem;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    th {
      color: var(--muted);
      font-weight: 600;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    tr:last-child td { border-bottom: none; }
    code, .mono { font-family: ui-monospace, "Cascadia Code", Consolas, monospace; font-size: 0.78rem; }
    .empty { color: var(--muted); font-style: italic; padding: 0.75rem 0; }
    footer {
      margin-top: 1.5rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.78rem;
    }
    a { color: var(--accent); }
    #error { color: var(--bad); margin-bottom: 1rem; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Fractanet Ops</h1>
      <div class="subtitle">Packet attractor blackboard and Guide stack</div>
    </div>
    <div class="subtitle" id="refresh-label">Loading…</div>
  </header>
  <main>
    <div id="error" hidden></div>
    <div class="grid" id="cards"></div>
    <section>
      <h3>Attractors</h3>
      <div id="attractors"></div>
    </section>
    <section>
      <h3>Recent events</h3>
      <div id="events"></div>
    </section>
    <footer>
      JSON: <a href="/ops/status">/ops/status</a> ·
      Blackboard: <a href="/ops/blackboard">/ops/blackboard</a> ·
      <span id="generated-at"></span>
    </footer>
  </main>
  <script>
    function pill(ok, label) {
      const cls = ok === true ? "ok" : ok === false ? "bad" : "warn";
      return `<span class="pill ${cls}">${label}</span>`;
    }

    function fmtAge(iso, ttlSeconds) {
      if (!iso) return "—";
      const seen = Date.parse(iso);
      if (Number.isNaN(seen)) return "—";
      const ageSec = Math.round((Date.now() - seen) / 1000);
      const ttl = Number(ttlSeconds);
      if (Number.isFinite(ttl) && ttl > 0) {
        const left = ttl - ageSec;
        if (left <= 0) return `${ageSec}s ago (expired)`;
        return `${ageSec}s ago (${left}s TTL left)`;
      }
      return `${ageSec}s ago`;
    }

    function renderCards(data) {
      const mcpOk = data.mcp?.ok === true;
      const guideOk = data.guide?.ok === true;
      const backend = data.guide?.context?.retrieval_backend || "unknown";
      const inox = data.guide?.context?.inox_retrieval;
      const bb = data.blackboard || {};
      const cards = [
        { title: "MCP HTTP", value: pill(mcpOk, mcpOk ? "healthy" : "degraded"), sub: data.mcp?.mcp || data.mcp?.error || "" },
        { title: "Guide", value: pill(guideOk, guideOk ? "healthy" : "degraded"), sub: data.guide?.service || data.guide?.error || "" },
        { title: "Retrieval", value: backend, sub: inox?.configured ? `inox → ${inox.url || "configured"}` : "local / supabase" },
        { title: "Attractors", value: `${bb.fresh_attractor_count ?? 0} fresh / ${bb.attractor_count ?? 0} total`, sub: bb.snapshot_at ? `updated ${bb.snapshot_at}` : "no snapshot" },
      ];
      document.getElementById("cards").innerHTML = cards.map(c => `
        <div class="card">
          <h2>${c.title}</h2>
          <div class="value">${c.value}</div>
          <div class="subtitle mono">${c.sub}</div>
        </div>
      `).join("");
    }

    function renderTable(rows, columns) {
      if (!rows.length) return '<p class="empty">None</p>';
      const head = columns.map(c => `<th>${c.label}</th>`).join("");
      const body = rows.map(row => `<tr>${columns.map(c => `<td>${c.render(row)}</td>`).join("")}</tr>`).join("");
      return `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
    }

    function renderAttractors(bb) {
      const rows = (bb.attractors || []).map(a => {
        const fresh = (bb.fresh_attractors || []).some(f => f.id === a.id);
        return { ...a, _fresh: fresh };
      });
      document.getElementById("attractors").innerHTML = renderTable(rows, [
        { label: "ID", render: r => `<code>${r.id || "—"}</code>` },
        { label: "Node", render: r => `<code>${r.node?.resource_id || "—"}</code>` },
        { label: "Capabilities", render: r => (r.matches?.capabilities || []).join(", ") || "—" },
        { label: "Last seen", render: r => fmtAge(r.availability?.last_seen, r.availability?.ttl_seconds) },
        { label: "Status", render: r => pill(r._fresh, r._fresh ? "fresh" : "stale") },
      ]);
    }

    function renderEvents(bb) {
      const events = bb.recent_events || [];
      document.getElementById("events").innerHTML = renderTable(events.slice().reverse(), [
        { label: "When", render: r => `<code>${r.at || "—"}</code>` },
        { label: "Event", render: r => r.kind || "—" },
        { label: "Attractor", render: r => `<code>${r.attractor_id || "—"}</code>` },
        { label: "Node", render: r => r.node || "—" },
      ]);
    }

    async function refresh() {
      const err = document.getElementById("error");
      err.hidden = true;
      try {
        const res = await fetch("/ops/status", { cache: "no-store" });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || res.statusText);
        renderCards(data);
        renderAttractors(data.blackboard || {});
        renderEvents(data.blackboard || {});
        const when = new Date();
        document.getElementById("refresh-label").textContent = `Refreshed ${when.toLocaleTimeString()}`;
        document.getElementById("generated-at").textContent = data.generated_at ? `snapshot ${data.generated_at}` : "";
      } catch (e) {
        err.textContent = `Failed to load /ops/status: ${e.message}`;
        err.hidden = false;
      }
    }

    refresh();
    setInterval(refresh, 30000);
  </script>
</body>
</html>
